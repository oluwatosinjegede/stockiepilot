<!-- templates/billing/pay_signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Subscription - StockiePilot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-500 p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center">

  <h2 class="text-2xl font-bold mb-2">Activate Your Account</h2>
  <p class="text-gray-500 text-sm mb-6">
    Complete your subscription to unlock full features
  </p>

  <div class="bg-indigo-50 p-6 rounded-xl mb-6">
    <p class="text-sm text-gray-500">Subscription Fee</p>
    <h1 class="text-3xl font-bold text-indigo-600 mt-2">₦15,000</h1>
  </div>

  <a href="{% url 'billing:initiate_payment' %}"
     class="block w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-semibold">
    Pay Now
  </a>

  <p class="text-xs text-gray-400 mt-4">
    Secure payment powered by Paystack
  </p>

</div>
</body>
</html>
