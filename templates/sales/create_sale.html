{% extends "base.html" %}

{% block content %}

<div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow">

  <h2 class="text-xl font-bold mb-4">New Sale</h2>

  <form method="POST">
    {% csrf_token %}

    <label class="block mb-2">Products</label>
    <div id="sale-items" class="space-y-3 mb-4">
      <div class="grid grid-cols-12 gap-2 sale-item-row">
        <div class="col-span-6">
          <select name="product[]" class="w-full border p-2 product-select" required>
            <option value="">Select Product</option>
            {% for product in products %}
            <option value="{{ product.id }}">{{ product.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-span-3">
          <input type="number" min="1" value="1" name="quantity[]" class="w-full border p-2 quantity-input" required>
        </div>
        <div class="col-span-3">
          <input class="w-full border p-2 bg-gray-100 line-total" value="0.00" readonly>
        </div>
      </div>
    </div>

    <button type="button" id="add-item" class="mb-4 text-sm text-indigo-600 hover:text-indigo-800">
      + Add another product
    </button>

    <!-- TOTAL -->
    <label>Total</label>
    <input id="total" class="w-full border p-2 mb-4 bg-gray-100" readonly>

    <!-- PAYMENT STATUS -->
    <label class="block mb-2">Payment Type</label>
    <select id="payment_status" name="payment_status" class="w-full border p-2 mb-4">
      <option value="paid">Paid in Full</option>
      <option value="partial">Part Payment</option>
    </select>

    <div id="partial-payment-fields" class="hidden">
      <label>Customer Name</label>
      <input type="text" name="customer_name" id="customer_name"
             class="w-full border p-2 mb-4"
             placeholder="Enter customer name">

      <label>Amount Paid</label>
      <input type="number" step="0.01" min="0" name="amount_paid" id="amount_paid"
             class="w-full border p-2 mb-4"
             placeholder="0.00">

      <label>Balance</label>
      <input id="balance" class="w-full border p-2 mb-4 bg-gray-100" readonly>
    </div>

    <button class="bg-indigo-600 text-white px-4 py-2 rounded w-full">
      Complete Sale
    </button>

  </form>

</div>

<!--  FIXED JAVASCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const itemsWrapper = document.getElementById("sale-items");
    const addItemBtn = document.getElementById("add-item");
    const totalField = document.getElementById("total");
    const paymentStatusField = document.getElementById("payment_status");
    const partialPaymentFields = document.getElementById("partial-payment-fields");
    const amountPaidField = document.getElementById("amount_paid");
    const balanceField = document.getElementById("balance");

    addItemBtn.addEventListener("click", function () {
      const row = document.createElement("div");
      row.className = "grid grid-cols-12 gap-2 sale-item-row";
      row.innerHTML = `
        <div class="col-span-6">
          <select name="product[]" class="w-full border p-2 product-select" required>
            <option value="">Select Product</option>
            {% for product in products %}
            <option value="{{ product.id }}">{{ product.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-span-3">
          <input type="number" min="1" value="1" name="quantity[]" class="w-full border p-2 quantity-input" required>
        </div>
        <div class="col-span-2">
          <input class="w-full border p-2 bg-gray-100 line-total" value="0.00" readonly>
        </div>
        <div class="col-span-1">
          <button type="button" class="w-full p-2 border rounded text-red-500 remove-item">✕</button>
        </div>
      `;
      itemsWrapper.appendChild(row);
    });

    itemsWrapper.addEventListener("click", function (event) {
      if (event.target.classList.contains("remove-item")) {
        event.target.closest(".sale-item-row").remove();
        calculateTotal();
      }
    });

    itemsWrapper.addEventListener("change", handleRowChanges);
    itemsWrapper.addEventListener("input", handleRowChanges);

    paymentStatusField.addEventListener("change", togglePartialFields);
    amountPaidField.addEventListener("input", calculateBalance);

    function handleRowChanges(event) {
      const row = event.target.closest(".sale-item-row");
      if (!row) return;
      if (event.target.classList.contains("product-select")) {
        updateRowPrice(row);
      } else {
        calculateTotal();
      }
    }

        function updateRowPrice(row) {
      const select = row.querySelector(".product-select");
      const productId = select.value;

      if (!productId) {
        row.dataset.price = "0";
        row.querySelector(".line-total").value = "0.00";
        calculateTotal();
        return;
      }

      fetch(`/products/price/${productId}/`)
        .then(response => {
          if (!response.ok) {
            throw new Error("Failed to fetch price");
          }
          return response.json();
        })
        .then(data => {
          row.dataset.price = data.price || "0";
          calculateTotal();
        })
        .catch(error => {
          console.error("Error:", error);
        });
    }

    function calculateTotal() {
      let orderTotal = 0;
      document.querySelectorAll(".sale-item-row").forEach((row) => {
        const price = parseFloat(row.dataset.price || "0");
        const qty = parseInt(row.querySelector(".quantity-input")?.value || "0");
        const lineTotal = price * qty;
        row.querySelector(".line-total").value = lineTotal.toFixed(2);
        orderTotal += lineTotal;
      });

      totalField.value = orderTotal.toFixed(2);
      calculateBalance();
    }

    function togglePartialFields() {
        const isPartial = paymentStatusField.value === "partial";
        partialPaymentFields.classList.toggle("hidden", !isPartial);
        calculateBalance();
    }

    function calculateBalance() {
      const total = parseFloat(totalField.value || "0") || 0;
      const paid = parseFloat(amountPaidField.value) || 0;
      const balance = Math.max(total - paid, 0);
      balanceField.value = balance.toFixed(2);
    }

    togglePartialFields();

});
</script>

{% endblock %}
