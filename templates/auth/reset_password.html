<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - StockiePilot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-500 p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

  <h2 class="text-2xl font-bold text-center mb-4">Reset Password</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="bg-red-100 text-red-600 text-sm p-3 rounded mb-4">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <input type="password"
           name="password"
           placeholder="New Password"
           required
           class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">

    <input type="password"
           name="confirm_password"
           placeholder="Confirm New Password"
           required
           class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">

    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-semibold">
      Reset Password
    </button>
  </form>

  <p class="text-sm text-center mt-5">
    <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">
      ← Back to Login
    </a>
  </p>

</div>
</body>
</html>
