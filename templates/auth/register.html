<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account - StockiePilot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-500 p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

  <!-- HEADER -->
  <div class="text-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Create Your Account</h2>
    <p class="text-sm text-gray-500">Start managing your inventory smarter</p>
  </div>

  <!-- MESSAGES -->
  {% if messages %}
    {% for message in messages %}
      <div class="bg-red-100 text-red-600 text-sm p-2 rounded mb-3">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <!-- FORM -->
  <form method="POST" class="space-y-3">
    {% csrf_token %}

    <!-- Company -->
    <input name="company_name"
           placeholder="Company Name"
           required
           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <!-- Full Name -->
    <input name="full_name"
           placeholder="Full Name"
           required
           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <!-- Email -->
    <input name="email"
           type="email"
           placeholder="Email Address"
           required
           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <!-- Phone -->
    <input name="phone"
           placeholder="Phone Number"
           required
           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <!-- Address -->
    <textarea name="address"
              placeholder="Address (optional)"
              class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>

    <!-- Password -->
    <input type="password"
           name="password"
           placeholder="Password"
           required
           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <!-- Confirm Password -->
    <input type="password"
           name="confirm_password"
           placeholder="Confirm Password"
           required
           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <!-- BUTTON -->
    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-medium transition">
      Create Account
    </button>

  </form>

  <!-- FOOTER -->
  <p class="text-sm text-center mt-5 text-gray-600">
    Already have an account?
    <a href="{% url 'login' %}" class="text-indigo-600 font-medium hover:underline">
      Login
    </a>
  </p>

</div>

</body>
</html>
