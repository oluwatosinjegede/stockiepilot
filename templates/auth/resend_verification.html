<!-- templates/auth/resend_verification.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Email - StockiePilot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-500 p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

  <h2 class="text-2xl font-bold text-center mb-2">Verify Your Email</h2>
  <p class="text-sm text-gray-500 text-center mb-6">
    Enter your email to receive a new verification link
  </p>

  {% if messages %}
    {% for message in messages %}
      <div class="bg-indigo-100 text-indigo-700 text-sm p-3 rounded mb-4">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <input name="email"
           type="email"
           placeholder="you@example.com"
           required
           class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">

    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-semibold">
      Resend Verification Email
    </button>
  </form>

  <p class="text-sm text-center mt-5 text-gray-600">
    Back to
    <a href="{% url 'login' %}" class="text-indigo-600 font-medium hover:underline">
      Login
    </a>
  </p>

</div>
</body>
</html>
