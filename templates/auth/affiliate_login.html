<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Affiliate Login - StockiePilot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-500 p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Affiliate Login</h2>
      <p class="text-sm text-gray-500">Access your affiliate dashboard to monitor referrals and bonuses.</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="bg-red-100 text-red-700 text-sm p-2 rounded mb-3">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-3">
      {% csrf_token %}
      <input name="email" type="email" placeholder="Email Address" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <input name="password" type="password" placeholder="Password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-medium transition">Login</button>
    </form>

    <p class="text-sm text-center mt-5 text-gray-600">
      Need an affiliate account?
      <a href="{% url 'affiliate_register' %}" class="text-indigo-600 font-medium hover:underline">Sign up</a>
    </p>
  </div>
</body>
</html>
