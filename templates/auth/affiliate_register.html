<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Affiliate Sign Up - StockiePilot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-500 p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Affiliate Registration</h2>
      <p class="text-sm text-gray-500">Refer new company accounts and earn 10% on subscription payments.</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="bg-indigo-100 text-indigo-700 text-sm p-2 rounded mb-3">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-3">
      {% csrf_token %}
      <input name="full_name" placeholder="Full Name" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <input name="email" type="email" placeholder="Email Address" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <input name="phone" placeholder="Phone Number (optional)" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <textarea name="payout_details" placeholder="Payout details (bank, wallet, etc.)" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>

      <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-medium transition">Create Affiliate Account</button>
    </form>

    <p class="text-sm text-center mt-5 text-gray-600">
      Looking to create a company account?
      <a href="{% url 'register' %}" class="text-indigo-600 font-medium hover:underline">Go back</a>
    </p>
  </div>
</body>
</html>
