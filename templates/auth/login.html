<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - StockiePilot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-500 p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

  <!-- HEADER -->
  <div class="text-center mb-6">
    <h2 class="text-3xl font-bold text-gray-800">StockiePilot</h2>
    <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
  </div>

  <!-- DJANGO MESSAGES -->
  {% if messages %}
    {% for message in messages %}
      <div class="bg-red-100 text-red-600 text-sm p-3 rounded mb-4">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <!-- FORM -->
  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Email Address
      </label>
      <input name="email"
             type="email"
             required
             placeholder="you@example.com"
             class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>

    <!-- Password -->
    <div class="relative">
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Password
      </label>

      <input id="password"
             type="password"
             name="password"
             required
             placeholder="••••••••"
             class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <!-- Show/Hide Toggle -->
      <button type="button"
              onclick="togglePassword()"
              class="absolute right-3 top-9 text-gray-500 text-sm">
        👁
      </button>
    </div>

    <!-- Forgot / Resend -->
    <div class="flex justify-between text-sm text-gray-500">
      <a href="{% url 'resend_verification' %}" class="hover:text-indigo-600">
        Verify Email
      </a>
      <!-- Future -->
      <!-- <a href="#" class="hover:text-indigo-600">Forgot Password?</a> -->
    </div>

    <!-- LOGIN BUTTON -->
    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-semibold transition">
      Login
    </button>

  </form>

  <!-- DIVIDER -->
  <div class="my-6 text-center text-gray-400 text-sm">
    Don't have an account?
  </div>

  <!-- REGISTER -->
  <a href="{% url 'register' %}"
     class="block text-center w-full bg-gray-100 hover:bg-gray-200 text-indigo-600 py-2 rounded-lg font-semibold transition">
    Create Account
  </a>

</div>

<!-- SCRIPT -->
<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>

</body>
</html>
