<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <title>Login - StockiePilot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="StockiePilot">
  <link rel="manifest" href="{% url 'manifest' %}">
  <link rel="icon" type="image/png" sizes="192x192" href="{% static 'icons/icon-192.png' %}">
  <link rel="apple-touch-icon" href="{% static 'icons/icon-192.png' %}">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-500 p-4">
  <div class="fixed top-4 right-4 flex flex-col items-end gap-2">
  <button id="install-app-btn" class="hidden px-3 py-2 rounded-md bg-indigo-900/80 text-white text-sm font-medium">
    ⬇ Install App
  </button>
  <p id="install-app-help" class="text-[11px] text-white/80 text-right max-w-52">Install StockiePilot for app mode.</p>
</div>

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

  <!-- HEADER -->
  <div class="text-center mb-6">
    <h2 class="text-3xl font-bold text-gray-800">StockiePilot</h2>
    <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
  </div>

  <!-- DJANGO MESSAGES -->
  {% if messages %}
    {% for message in messages %}
      <div class="bg-red-100 text-red-600 text-sm p-3 rounded mb-4">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <!-- FORM -->
  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Email Address
      </label>
      <input name="email"
             type="email"
             required
             placeholder="you@example.com"
             class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>

    <!-- Password -->
    <div class="relative">
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Password
      </label>

      <input id="password"
             type="password"
             name="password"
             required
             placeholder="••••••••"
             class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <!-- Show/Hide Toggle -->
      <button type="button"
              onclick="togglePassword()"
              class="absolute right-3 top-9 text-gray-500 text-sm">
        👁
      </button>
    </div>

    <!-- Forgot / Resend -->
    <div class="flex justify-between text-sm text-gray-500">
      <a href="{% url 'resend_verification' %}" class="hover:text-indigo-600">
        Verify Email
      </a>
      <a href="{% url 'forgot_password' %}" class="hover:text-indigo-600">
        Forgot Password
      </a>
    </div>

    <!-- LOGIN BUTTON -->
    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-semibold transition">
      Login
    </button>

  </form>

  <!-- DIVIDER -->
  <div class="my-6 text-center text-gray-400 text-sm">
    Don't have an account?
  </div>

  <!-- REGISTER -->
  <a href="{% url 'register' %}"
     class="block text-center w-full bg-gray-100 hover:bg-gray-200 text-indigo-600 py-2 rounded-lg font-semibold transition">
    Create Account
  </a>

</div>

<!-- SCRIPT -->
<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js').catch(function (error) {
      console.warn('Service worker registration failed:', error)
    })
  })
}
</script>
<script src="{% static 'js/pwa-install.js' %}"></script>

</body>
</html>
